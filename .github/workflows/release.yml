name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'release:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version from pyproject.toml
        id: version
        run: |
          version=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Extract changelog for this version
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No changelog entry found for version $version"
            exit 1
          fi

      - name: Append Docker instructions to release notes
        run: |
          version="${{ steps.version.outputs.version }}"
          cat >> /tmp/release-notes.md <<EOF

---

### 🐳 Docker

\`\`\`bash
docker pull ghcr.io/petrmalina/netmeter:${version}
\`\`\`

Or use the attached \`docker-compose.yml\`:

\`\`\`bash
curl -LO https://github.com/petrmalina/netmeter/releases/download/v${version}/docker-compose.yml
docker compose up -d
\`\`\`

[View on GitHub Container Registry](https://github.com/petrmalina/netmeter/pkgs/container/netmeter)
EOF

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "NetMeter ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --target main \
            docker-compose.yml
